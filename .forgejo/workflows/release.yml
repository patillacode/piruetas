name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: docker
    container:
      image: catthehacker/ubuntu:act-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv --no-cache-dir

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check app/ tests/

      - name: Check formatting
        run: uv run ruff format --check app/ tests/

      - name: Run tests
        run: uv run pytest

  e2e:
    needs: test
    runs-on: docker
    container:
      image: mcr.microsoft.com/playwright/python:v1.49.1-jammy
    steps:
      - name: Install Node.js for actions runner
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv --no-cache-dir

      - name: Install dependencies
        run: uv sync --extra e2e --extra dev

      - name: Install Playwright browsers
        run: uv run playwright install chromium firefox

      - name: Run E2E tests
        run: uv run pytest tests/e2e/ -v --browser chromium --browser firefox --output=test-results
        env:
          SECRET_KEY: test-secret-key-for-playwright-e2e
          SECURE_COOKIES: "false"
          DATA_DIR: /tmp/piruetas-e2e

      - name: Upload test artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/

  build:
    needs: e2e
    permissions:
      packages: write
    runs-on: docker
    container:
      image: catthehacker/ubuntu:act-22.04
      options: --volume /var/run/docker.sock:/var/run/docker.sock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image tags
        id: meta
        shell: bash
        run: |
          echo "GITHUB_REF=${GITHUB_REF}"
          FORGEJO_IMAGE=forgejo.patilla.es/patillacode/piruetas
          GHCR_IMAGE=ghcr.io/patillacode/piruetas
          TAGS="${FORGEJO_IMAGE}:latest,${GHCR_IMAGE}:latest"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${FORGEJO_IMAGE}:${VERSION},${GHCR_IMAGE}:${VERSION}"
          fi
          echo "Final tags: ${TAGS}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Forgejo registry
        uses: docker/login-action@v3
        with:
          registry: forgejo.patilla.es
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
