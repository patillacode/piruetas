name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: docker
    container:
      image: catthehacker/ubuntu:act-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv --no-cache-dir

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check app/ tests/

      - name: Check formatting
        run: uv run ruff format --check app/ tests/

      - name: Run tests
        run: uv run pytest

  e2e:
    needs: test
    runs-on: docker
    container:
      image: mcr.microsoft.com/playwright/python:v1.49.1-jammy
    steps:
      - name: Install Node.js for actions runner
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv --no-cache-dir

      - name: Install dependencies
        run: uv sync --extra e2e --extra dev

      - name: Install Playwright browsers
        run: uv run playwright install chromium firefox

      - name: Run E2E tests
        run: uv run pytest tests/e2e/ -v --browser chromium --browser firefox --output=test-results
        env:
          SECRET_KEY: test-secret-key-for-playwright-e2e
          SECURE_COOKIES: "false"
          DATA_DIR: /tmp/piruetas-e2e

      - name: Upload test artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
