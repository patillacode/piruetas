<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Piruetas — a private self-hosted journal.">
    <title>{% block title %}Piruetas{% endblock %}</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/static/img/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon/favicon-16x16.png">
    <link rel="manifest" href="/static/img/favicon/site.webmanifest">
    <script nonce="{{ csp_nonce }}">
        /* Must be inline: runs before CSS to prevent flash of unstyled content */
        try {
            const _t = localStorage.getItem('theme');
            if (_t) document.documentElement.setAttribute('data-theme', _t);
        } catch (e) {}
    </script>
    <link rel="stylesheet" href="/static/css/base.css">
    {% block head_extra %}{% endblock %}
</head>

<body class="{% block body_class %}{% endblock %}">
    {% block body %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>

</html>
