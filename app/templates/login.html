{% extends "base.html" %}

{% block title %}Piruetas — Sign in{% endblock %}
{% block body_class %}login-page{% endblock %}

{% block body %}
<div class="card">
    <h1 class="login__title">Piruetas</h1>
    {% if error %}<p class="form__error">{{ error }}</p>{% endif %}
    <form method="post" action="/login">
        <input type="hidden" name="login_csrf_token" value="{{ login_csrf_token }}">
        <div class="field">
            <label for="username">{{ t.username if t is defined else 'Username' }}</label>
            <input type="text" id="username" name="username" required autofocus>
        </div>
        <div class="field">
            <label for="password">{{ t.password if t is defined else 'Password' }}</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary">{{ t.sign_in if t is defined else 'Sign in' }}</button>
    </form>
    <a href="/" class="login__back">Piruetas ↗</a>
</div>
{% endblock %}
