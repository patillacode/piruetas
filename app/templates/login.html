{% extends "base.html" %}

{% block title %}Piruetas — Sign in{% endblock %}
{% block body_class %}login-page{% endblock %}

{% block body %}
<main id="main-content">
<div class="card">
    <a href="/" class="card-brand">
        <img src="/static/img/logo-alpha-square.png" alt="Piruetas" class="card-brand__img">
        <span class="card-brand__name">Piruetas</span>
    </a>
{% if error %}<p class="form__error">{{ error }}</p>{% endif %}
    <form method="post" action="/login">
        <input type="hidden" name="login_csrf_token" value="{{ login_csrf_token }}">
        <div class="field">
            <label for="username">{{ t.username }}</label>
            <input type="text" id="username" name="username" required autofocus>
        </div>
        <div class="field">
            <label for="password">{{ t.password }}</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary">{{ t.sign_in }}</button>
    </form>
    <div class="login__back-row">
        <a href="/forgot-password" class="login__back">{{ t.forgot_password_link }}</a>
        <a href="/signup" class="login__back">{{ t.sign_up }}</a>
    </div>
</div>
</main>
{% endblock %}
