{% extends "base.html" %}

{% block title %}Piruetas — Reset password{% endblock %}
{% block body_class %}login-page{% endblock %}

{% block body %}
<div class="card">
    <a href="/" class="card-brand">
        <img src="/static/img/logo-alpha-square.png" alt="Piruetas" class="card-brand__img">
        <span class="card-brand__name">Piruetas</span>
    </a>
    <p class="login__subtitle">{{ t.reset_password }}</p>
    {% if error %}<p class="form__error">{{ error }}</p>{% endif %}
    <form method="post" action="/forgot-password">
        <input type="hidden" name="login_csrf_token" value="{{ login_csrf_token }}">
        <div class="field">
            <label for="username">{{ t.username }}</label>
            <input type="text" id="username" name="username" required autofocus autocomplete="username">
        </div>
        <div class="field">
            <label for="recovery_code">{{ t.forgot_password_recovery_code }}</label>
            <input type="text" id="recovery_code" name="recovery_code" required placeholder="XXXX-XXXX-XXXX" autocomplete="off">
        </div>
        <div class="field">
            <label for="new_password">{{ t.new_password }}</label>
            <input type="password" id="new_password" name="new_password" required minlength="8" autocomplete="new-password">
        </div>
        <div class="field">
            <label for="confirm_password">{{ t.confirm_password }}</label>
            <input type="password" id="confirm_password" name="confirm_password" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary">{{ t.reset_password }}</button>
    </form>
    <a href="/login" class="login__back">{{ t.back_to_sign_in }}</a>
</div>
{% endblock %}

{% block scripts %}
<script nonce="{{ csp_nonce }}">
(function () {
    const pw = document.getElementById('new_password');
    const cpw = document.getElementById('confirm_password');
    function check() {
        if (cpw.value && pw.value !== cpw.value) {
            cpw.setCustomValidity('Passwords do not match');
        } else {
            cpw.setCustomValidity('');
        }
    }
    pw.addEventListener('input', check);
    cpw.addEventListener('input', check);
})();
</script>
{% endblock %}
