{% extends "base.html" %}

{% block title %}Piruetas — Sign up{% endblock %}
{% block body_class %}login-page{% endblock %}

{% block body %}
<div class="card">
    <a href="/" class="card-brand">
        <img src="/static/img/logo-alpha-square.png" alt="Piruetas" class="card-brand__img">
        <span class="card-brand__name">Piruetas</span>
    </a>
    <p class="signup-closed__message">{{ t.signup_closed_message }}</p>
    <a href="/login" class="login__back">{{ t.signup_closed_back }}</a>
</div>
{% endblock %}
