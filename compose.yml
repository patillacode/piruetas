services:
  piruetas:
    image: forgejo.patilla.es/patillacode/piruetas:latest
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./data:/data
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
